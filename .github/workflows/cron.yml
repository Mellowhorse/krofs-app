name: cron-tick

# Free scheduler for the outbox sweeps (dispatch / 24h reminder / day-5 close).
# GitHub Actions cron can be delayed or skipped under load — fine here because
# every sweep is idempotent and time-based (a late tick just catches up).
# Scheduled workflows also pause after 60 days of repo inactivity.
#
# ONE-TIME SETUP: add a repo secret CRON_SWEEP_SECRET
#   (GitHub -> Settings -> Secrets and variables -> Actions -> New repository
#    secret) with the same value as CRON_SWEEP_SECRET in web/.env.local.
# If you move to a custom domain, update TICK_URL below.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/tick
        env:
          TICK_URL: https://krofs-app.vercel.app/api/tick
          CRON_SECRET: ${{ secrets.CRON_SWEEP_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::repo secret CRON_SWEEP_SECRET ontbreekt — voeg 'm toe onder Settings -> Secrets -> Actions"
            exit 1
          fi
          code=$(curl -s -o /tmp/tick.json -w '%{http_code}' --max-time 60 \
            -X POST "$TICK_URL" -H "x-cron-secret: $CRON_SECRET")
          echo "HTTP $code"
          cat /tmp/tick.json 2>/dev/null || true
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::tick faalde (HTTP $code)"
            exit 1
          fi
