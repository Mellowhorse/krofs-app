name: ci

on:
  push:
  pull_request:

jobs:
  migrations:
    name: migrations apply + smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: CI stubs (auth schema + roles)
        run: psql -v ON_ERROR_STOP=1 -f db/tests/ci_stubs.sql

      - name: Apply db/001 (base schema)
        run: psql -v ON_ERROR_STOP=1 -f db/001_initial_schema.sql

      - name: Apply db/002 (reconciliation)
        run: psql -v ON_ERROR_STOP=1 -f db/002_reconcile.sql

      - name: Apply db/003 (product improvements)
        run: psql -v ON_ERROR_STOP=1 -f db/003_product_improvements.sql

      - name: Apply db/004 (security hardening)
        run: psql -v ON_ERROR_STOP=1 -f db/004_security_hardening.sql

      - name: Apply db/005 (painter RPCs)
        run: psql -v ON_ERROR_STOP=1 -f db/005_painter_rpcs.sql

      - name: Apply db/006 (round dispatch)
        run: psql -v ON_ERROR_STOP=1 -f db/006_round_dispatch.sql

      - name: Apply db/007 (automated outbox)
        run: psql -v ON_ERROR_STOP=1 -f db/007_outbox.sql

      - name: Apply db/008 (geocoding)
        run: psql -v ON_ERROR_STOP=1 -f db/008_geocode.sql

      - name: Apply db/009 (route clustering)
        run: psql -v ON_ERROR_STOP=1 -f db/009_route_clustering.sql

      - name: Apply db/010 (public intake)
        run: psql -v ON_ERROR_STOP=1 -f db/010_public_intake.sql

      - name: Seed (synthetic dev data must load cleanly)
        run: psql -v ON_ERROR_STOP=1 -f db/seed_dev.sql

      - name: Smoke tests
        run: psql -v ON_ERROR_STOP=1 -f db/tests/smoke_test.sql
